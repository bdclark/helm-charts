suite: test deployment
templates:
  - deployment.yaml
tests:
  - it: should create deployment with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: RELEASE-NAME-wyoming-piper
      - equal:
          path: spec.replicas
          value: 1
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^rhasspy/wyoming-piper:"
      - equal:
          path: spec.strategy.type
          value: Recreate

  - it: should use custom image
    set:
      image.repository: my-wyoming-piper
      image.tag: "custom"
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: "my-wyoming-piper:custom"

  - it: should use appVersion when tag not specified
    set:
      image.tag: ""
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "^rhasspy/wyoming-piper:.+"

  - it: should mount data volume when persistence enabled
    set:
      persistence.enabled: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /data
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: RELEASE-NAME-wyoming-piper-data

  - it: should use custom mount path
    set:
      persistence.enabled: true
      persistence.mountPath: /custom/data
    asserts:
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: data
            mountPath: /custom/data

  - it: should use existing claim when specified
    set:
      persistence.enabled: true
      persistence.existingClaim: my-data-pvc
    asserts:
      - contains:
          path: spec.template.spec.volumes
          content:
            name: data
            persistentVolumeClaim:
              claimName: my-data-pvc

  - it: should not mount volumes when persistence disabled
    set:
      persistence.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].volumeMounts
      - isNull:
          path: spec.template.spec.volumes

  - it: should set environment variables
    set:
      env:
        TZ: America/New_York
        PUID: "1000"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: TZ
            value: America/New_York
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: PUID
            value: "1000"

  - it: should set environment variables from secrets
    set:
      env:
        SECRET_VAR:
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: secret-key
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SECRET_VAR
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: secret-key

  - it: should apply envFrom
    set:
      envFrom:
        - secretRef:
            name: my-secret
        - configMapRef:
            name: my-config
    asserts:
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            secretRef:
              name: my-secret
      - contains:
          path: spec.template.spec.containers[0].envFrom
          content:
            configMapRef:
              name: my-config

  - it: should configure container ports
    set:
      ports:
        - name: wyoming
          containerPort: 10200
          protocol: TCP
    asserts:
      - contains:
          path: spec.template.spec.containers[0].ports
          content:
            name: wyoming
            containerPort: 10200
            protocol: TCP
