# -- Name override of the chart.
nameOverride: ""
# -- Full name override of the chart.
fullnameOverride: ""

# -- Number of replicas for the deployment.
replicaCount: 1

# -- Strategy for replacing old pods with new ones.
strategy:
  type: Recreate


# -- Image pull secrets for the deployment.
imagePullSecrets: []

# -- Annotations on the Deployment definition.
deploymentAnnotations: {}

# -- Additional labels on the Deployment definition.
extraDeploymentLabels: {}

# -- Annotations on the pod.
podAnnotations: {}

# -- Additional labels on the pod.
podLabels: {}

# -- Pod security context.
podSecurityContext: {}
  # fsGroup: 2000

# qBittorrent configuration
qbittorrent:
  image:
    # -- qBittorrent container image repository.
    repository: lscr.io/linuxserver/qbittorrent
    # -- Overrides the image tag whose default is the chart appVersion.
    tag: ""
    # -- The image pull policy.
    pullPolicy: IfNotPresent

  # -- Container security context.
  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  # -- Resource requests and limits for the container.
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # -- Ports to expose from the container.
  ports:
    - name: http
      containerPort: 8080
      protocol: TCP

  # -- Liveness probe configuration for the container.
  livenessProbe: {}
    # httpGet:
    #   path: /
    #   port: http
  # -- Readiness probe configuration for the container.
  readinessProbe: {}
    # httpGet:
    #   path: /
    #   port: http

  # -- Map of environment variables for the container
  env: {}
    # TZ: Etc/UTC
    # PUID: "1000"
    # PGID: "1000"
    # MY_PASSWORD:
    #   valueFrom:
    #     secretKeyRef:
    #       name: mysecret
    #       key: password
    # MY_CONFIG_VALUE:
    #   valueFrom:
    #     configMapKeyRef:
    #       name: my-config
    #       key: config_value
  # -- Environment variables for the container from ConfigMap or Secret references.
  envFrom: []
    # - configMapRef:
    #     name: qbittorrent-vpn-env
    # - secretRef:
    #     name: qbittorrent-vpn-secret-env

  # Persistent storage for qbittorrent
  persistence:
    config:
      # -- Enable persistent volume for qbittorrent config
      enabled: true
      # -- Storage class for config PVC
      # Set to "-" to disable dynamic provisioning and use default storage class
      # Set to "" to use cluster default storage class
      storageClass: ""
      # -- Access modes for the config PVC
      accessModes:
        - ReadWriteOnce
      # -- Requested config PVC size
      size: 2Gi
      # -- Use an existing PVC instead of creating a new one
      existingClaim: ""
      # -- Annotations for config PVC
      annotations: {}
        # k8up.io/backup: "true"
    downloads:
      # -- Enable persistent volume for qbittorrent downloads
      enabled: false
      # -- Storage class for downloads PVC
      # Set to "-" to disable dynamic provisioning and use default storage class
      # Set to "" to use cluster default storage class
      storageClass: ""
      # -- Access modes for the downloads PVC
      accessModes:
        - ReadWriteOnce
      # -- Requested downloads PVC size
      size: 2Gi
      # -- Use an existing PVC instead of creating a new one
      existingClaim: ""
      # -- Annotations for downloads PVC
      annotations: {}
        # k8up.io/backup: "true"

  # -- Additional volumeMounts for the container.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

# Gluetun VPN sidecar configuration
gluetun:
  # -- Enable Gluetun VPN sidecar container.
  enabled: true

  # -- Gluetun container lifecycle mode; determines how it is run alongside qbittorrent.
  # Options are "nativeSidecar" (initContainer with restartPolicy Always) or "standard" (normal container).
  # Note: native sidecar support became stable/GA in Kubernetes v1.33 (alpha in v1.28, beta in v1.29).
  lifecycleMode: "nativeSidecar"
  # -- Lifecycle hooks for the gluetun container.
  lifecycleHooks: {}

  image:
    # -- Gluetun container image repository.
    repository: qmcgaw/gluetun
    # -- Gluetun image tag.
    tag: v3.41.0
    # -- The image pull policy.
    pullPolicy: IfNotPresent

  # -- Whether the Gluetun container needs /dev/net/tun device.
  needsTunDevice: true

  # -- Container security context.
  securityContext:
    capabilities:
      add:
        - NET_ADMIN

  # -- Resource requests and limits for the container.
  resources: {}
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # -- Ports to expose from the gluetun container.
  ports: []
    # - name: openvpn
    #   containerPort: 1194
    #   protocol: UDP

  # -- Liveness probe configuration for the container.
  livenessProbe: {}
  # -- Readiness probe configuration for the container.
  readinessProbe: {}

  # -- Map of environment variables for the container
  env: {}
    # TZ: Etc/UTC
    # PUID: "1000"
    # PGID: "1000"
    # MY_PASSWORD:
    #   valueFrom:
    #     secretKeyRef:
    #       name: mysecret
    #       key: password
    # MY_CONFIG_VALUE:
    #   valueFrom:
    #     configMapKeyRef:
    #       name: my-config
    #       key: config_value
  # -- Environment variables for the container from ConfigMap or Secret references.
  envFrom: []
    # - configMapRef:
    #     name: gluetun-env
    # - secretRef:
    #     name: gluetun-secret-env

  # Persistent storage for gluetun
  persistence:
    # -- Enable persistent volume for gluetun
    enabled: false
    # -- Storage class for gluetun PVC
    # Set to "-" to disable dynamic provisioning and use default storage class
    # Set to "" to use cluster default storage class
    storageClass: ""
    # -- Access modes for the gluetun PVC
    accessModes:
      - ReadWriteOnce
    # -- Requested gluetun PVC size
    size: 200Mi
    # -- Use an existing PVC instead of creating a new one
    existingClaim: ""
    # -- Annotations for gluetun PVC
    annotations: {}
      # k8up.io/backup: "true"

  # -- Additional volumeMounts for the gluetun container.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

service:
  # -- Kubernetes Service type for the Web UI.
  type: ClusterIP
  # -- The port the service will listen on for the Web UI.
  port: 8080

# Ingress configuration
ingress:
  # -- Expose the service via an Ingress.
  enabled: false
  # -- Ingress  class name.
  className: ""
  # -- Annotations on the Ingress resource.
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  # -- Hostnames for the Ingress resource.
  hosts:
    - host: qbittorrent.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  # -- TLS configuration for the Ingress resource.
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

# HTTPRoute configuration
# Requires Gateway API resources and suitable controller installed within the cluster
# (see: https://gateway-api.sigs.k8s.io/guides/)
httpRoute:
  # -- Enable creation of HTTPRoute resource.
  enabled: false
  # -- Annotations on the HTTPRoute resource.
  annotations: {}
  # -- Parent references to Gateway resources.
  parentRefs:
    - name: gateway
      sectionName: http
    # namespace: default
  # -- List of hostnames for the HTTPRoute.
  hostnames:
    - qbittorrent.local
  # -- List of rules and filters applied.
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /headers
  #   filters:
  #   - type: RequestHeaderModifier
  #     requestHeaderModifier:
  #       set:
  #       - name: My-Overwrite-Header
  #         value: this-is-the-only-value
  #       remove:
  #       - User-Agent
  # - matches:
  #   - path:
  #       type: PathPrefix
  #       value: /echo
  #     headers:
  #     - name: version
  #       value: v2

# -- Additional init containers on the Deployment definition.
# NOTE: These will run before the gluetun initContainer (if enabled as such).
initContainers: []

# -- Additional containers on the Deployment definition.
extraContainers: []

# -- Additional volumes on the Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# -- Node selector for pod assignment.
nodeSelector: {}

# -- Tolerations for pod assignment.
tolerations: []

# -- Affinity rules for pod assignment.
affinity: {}
