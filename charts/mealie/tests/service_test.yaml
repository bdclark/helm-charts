suite: test service
templates:
  - service.yaml
tests:
  - it: should create service with default values
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: RELEASE-NAME-mealie
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 9000

  - it: should apply common labels to service
    set:
      commonLabels:
        app.kubernetes.io/part-of: media-stack
    asserts:
      - equal:
          path: metadata.labels["app.kubernetes.io/part-of"]
          value: media-stack
