{{- if and .Values.bootstrap.enabled (not .Values.bootstrap.existingConfig.type) }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "nzbget.fullname" . }}-bootstrap
  labels:
    {{- include "nzbget.labels" . | nindent 4 }}
data:
  nzbget.conf: |
{{ .Values.bootstrap.config | indent 4 }}
{{- end }}
